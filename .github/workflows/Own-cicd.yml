name : CICD-own

on: workflow_dispatch

jobs:
  code: 
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        run: echo "Cloning the code !"
        
  build:
    needs: code
    runs-on: ubuntu-latest
    steps:
      - name: building the code
        run: echo "Sucessfully build the code!"
        
  test:
    needs: [code,build]
    runs-on: ubuntu-latest
    steps:
      - name: Testing the code
        run: echo "Testing the code!"
        
  deploy:
    needs: [test,build]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the code
        run: echo "Deploying the code!"

  
